apis:

  - aid: ror-rest-api
    name: ROR REST API
    description: >-
      The ROR REST API provides programmatic access to the Research Organization
      Registry, enabling users to retrieve, search, filter, and match
      organization records by name, identifier, affiliation text, or metadata
      fields. Returns JSON responses with full record details including names,
      locations, external IDs, and organizational relationships.
