aid: ror
name: ROR
description: >-
  ROR (Research Organization Registry) is a global, community-led, curated
  registry of open persistent identifiers for research organizations. It
  provides unique, stable identifiers (ROR IDs) for over 120,000 universities,
  companies, government labs, nonprofits, and other organizations involved in
  scholarly research. The registry is maintained collaboratively by California
  Digital Library, Crossref, and DataCite, with all data available under the
  CC0 license. ROR offers a free REST API for querying, searching, and
  retrieving organization records, and is integrated as the preferred
  organization identifier across Crossref, DataCite, and ORCID platforms.
type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
